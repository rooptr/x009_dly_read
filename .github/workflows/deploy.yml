name: Daily Newspaper Deploy

on:
  push:
    branches:
      - main
  schedule:
    # 03:30 UTC is 09:00 AM IST
    - cron: '30 0 * * *'
  workflow_dispatch: # Allows you to manually trigger it anytime

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, but DO NOT cancel in progress.
# Canceling a mid-flight pages deployment breaks the backend queue.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          pip install beautifulsoup4

      - name: Fetch Today's Papers
        run: python fetch_papers.py

      - name: Crop Market Box
        run: |
          if [ -f "bs.pdf" ]; then
            pdftocairo -png -f 1 -l 1 -x 25 -y 220 -W 320 -H 250 bs.pdf crop
            mv crop*.png market_box.png
          else
            echo "Warning: bs.pdf not found! Creating dummy market_box.png to prevent crash."
            touch market_box.png
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy-pages:
    needs: deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
