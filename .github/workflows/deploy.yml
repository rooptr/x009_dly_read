name: Daily Newspaper Deploy

on:
  push:
    branches:
      - main
  schedule:
    # 03:30 UTC is 09:00 AM IST
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to manually trigger it anytime

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, but DO NOT cancel in progress.
# Canceling a mid-flight pages deployment breaks the backend queue.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils qpdf ghostscript mupdf-tools clamav yara file
          pip install beautifulsoup4 gdown

      - name: Fetch Today's Papers
        run: python fetch_papers.py

      - name: Scan and disarm validated papers
        run: |
          mkdir -p .pdf-security
          mkdir -p .pdf-forensics
          cp *.pdf .pdf-forensics/ 2>/dev/null || true
          ulimit -v 2097152
          ulimit -f 2097152
          sudo freshclam --stdout --quiet || true
          for pdf in *.pdf; do
            [ -e "$pdf" ] || continue
            clamscan --no-summary --infected "$pdf"
            if yara security/pdf_rules.yar "$pdf"; then
              echo "Active or embedded PDF content detected in $pdf"
              exit 1
            fi
          done
          for pdf in *.pdf; do
            [ -e "$pdf" ] || continue
            name=$(basename "$pdf")
            timeout 120s qpdf --check "$pdf"
            timeout 120s pdfinfo "$pdf" > ".pdf-security/$name.info"
            pages=$(awk '/^Pages:/ {print $2}' ".pdf-security/$name.info")
            [ -n "$pages" ] && [ "$pages" -le 1000 ] || { echo "Invalid page count in $name"; exit 1; }
            timeout 120s mutool clean -d "$pdf" ".pdf-security/$name.clean.pdf"
            timeout 120s gs -q -dSAFER -dBATCH -dNOPAUSE -sDEVICE=pdfwrite \
              -sOutputFile=".pdf-security/$name.safe.pdf" "$pdf"
            timeout 120s qpdf --check ".pdf-security/$name.safe.pdf"
          done

      - name: Retain rejected PDFs for review
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rejected-pdf-forensics
          path: .pdf-forensics
          retention-days: 7
          if-no-files-found: ignore

      - name: Crop market box from disarmed PDF
        run: |
          if [ -f "bs.pdf" ]; then
            pdftocairo -png -f 1 -l 1 -x 25 -y 220 -W 320 -H 250 \
              .pdf-security/bs.pdf.safe.pdf crop
            mv crop*.png market_box.png
          else
            echo "Warning: bs.pdf not found! Creating dummy market_box.png to prevent crash."
            touch market_box.png
          fi

      - name: Assemble validated site artifact
        run: |
          rm -rf site
          mkdir site
          cp index.html headlines.json gold_rate.json market_stats.json quiz.json site/
          cp pdf_manifest.json site/ 2>/dev/null || true
          cp baby.png baby_animated.png box_bottom.png box_lid.png pixel_pizza_slice.png site/ 2>/dev/null || true
          cp Thesignature.otf Thesignature.ttf site/ 2>/dev/null || true
          for pdf in *.pdf; do
            [ -e "$pdf" ] || continue
            safe=".pdf-security/$pdf.safe.pdf"
            [ -f "$safe" ] || { echo "Missing disarmed output for $pdf"; exit 1; }
            cp "$safe" "site/$pdf"
          done
          cp market_box.png site/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    needs: deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
