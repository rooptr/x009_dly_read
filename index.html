<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Today's Papers</title>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
    <style>
        :root {
            --magenta: #E76F51; /* Muted Terracotta */
            --cyan: #2A9D8F; /* Muted Teal */
            --yellow: #E9C46A; /* Soft Gold */
            --black: #264653; /* Dark Slate */
        }
        
        body, html {
            margin: 0;
            padding: 0;
            min-height: 100%;
            /* Halftone dot pattern background */
            background-color: #f0f0f0;
            background-image: radial-gradient(#ccc 15%, transparent 16%), radial-gradient(#ccc 15%, transparent 16%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            font-family: 'Patrick Hand', cursive;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--black);
        }
        
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            padding: 20px;
        }

        /* Chromatic Aberration Header */
        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-align: center;
            background: #fff;
            padding: 10px 30px;
            border: 4px solid var(--black);
            /* Spider-Verse style drop shadows */
            box-shadow: 4px 4px 0px var(--magenta), -4px -4px 0px var(--cyan), 8px 8px 0px var(--black);
            transform: rotate(-2deg);
        }
        
        .pizza-wrapper {
            position: relative;
            width: 300px;
            height: 400px;
            margin-top: 10px;
            transform: rotate(12deg);
        }

        /* Pizza with chromatic aberration borders */
        .slice-outline {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 2;
            filter: drop-shadow(4px 4px 0px var(--magenta)) drop-shadow(-3px -3px 0px var(--cyan));
        }

        .toppings {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 3;
        }

        /* Comic Book Toppings */
        a.topping {
            position: absolute;
            width: 76px; height: 76px;
            border: 4px solid var(--black);
            display: flex; align-items: center; justify-content: center;
            text-align: center; text-decoration: none;
            color: var(--black); font-size: 18px; font-weight: bold; line-height: 1.1;
            background-color: var(--yellow);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            /* Comic shadow */
            box-shadow: 4px 4px 0px var(--black);
        }
        
        .t-et { top: 85px; left: 60px; transform: rotate(-5deg); background-color: var(--magenta); color: #fff; border-radius: 40% 60% 55% 45% / 55% 45% 60% 40%; }
        .t-bs { top: 100px; left: 155px; transform: rotate(8deg); background-color: var(--cyan); border-radius: 60% 40% 45% 55% / 40% 60% 45% 55%; }
        .t-fe { top: 175px; left: 100px; transform: rotate(-10deg); background-color: var(--yellow); border-radius: 55% 45% 40% 60% / 60% 40% 55% 45%; }
        .t-mint { top: 265px; left: 112px; transform: rotate(4deg); background-color: #fff; border-radius: 45% 55% 60% 40% / 45% 55% 40% 60%; }

        a.topping:hover {
            transform: scale(1.2) rotate(0deg);
            box-shadow: 6px 6px 0px var(--black), -3px -3px 0px var(--magenta);
            z-index: 10;
        }

        /* --- EXTRAS BUTTON --- */
        .extras {
            margin-top: 10px;
            margin-bottom: 40px;
            z-index: 50;
        }

        .extra-btn {
            font-family: 'Patrick Hand', cursive;
            font-size: 26px;
            font-weight: bold;
            background: var(--yellow);
            border: 4px solid var(--black);
            padding: 10px 30px;
            cursor: pointer;
            box-shadow: 5px 5px 0px var(--magenta), -3px -3px 0px var(--cyan), 8px 8px 0px var(--black);
            transform: rotate(2deg);
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .extra-btn:hover {
            transform: translate(-2px, -2px) rotate(0deg) scale(1.05);
            box-shadow: 7px 7px 0px var(--magenta), -5px -5px 0px var(--cyan), 10px 10px 0px var(--black);
        }

        .extra-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--black);
        }

        /* --- CLIPBOARD MODAL --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none; justify-content: center; align-items: center;
            z-index: 100; opacity: 0; transition: opacity 0.3s ease;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active { display: flex; opacity: 1; }
        
        .clipboard {
            position: relative;
            background: #8b5a2b; /* Wooden board */
            width: 90%; max-width: 500px;
            padding: 40px 20px 20px 20px;
            border-radius: 10px;
            border: 4px solid var(--black);
            box-shadow: 10px 10px 0px var(--black);
            transform: translateY(50px) rotate(-2deg);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active .clipboard { transform: translateY(0) rotate(0deg); }

        /* Silver Clip at top */
        .clip {
            position: absolute;
            top: -15px; left: 50%; transform: translateX(-50%);
            width: 120px; height: 40px;
            background: #ccc;
            border: 3px solid var(--black);
            border-radius: 5px;
            box-shadow: 0px 4px 0px rgba(0,0,0,0.5);
            z-index: 10;
        }
        
        /* The paper pinned to clipboard */
        .paper {
            background: #fff;
            padding: 15px;
            border: 2px solid var(--black);
            min-height: 200px;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.2);
            text-align: center;
        }

        .paper h2 {
            margin-top: 0;
            border-bottom: 2px dashed #ccc;
            padding-bottom: 10px;
            font-size: 28px;
            color: #d32f2f;
        }

        .paper img {
            max-width: 100%;
            border: 2px solid #333;
            /* Give the image a slight tilt */
            transform: rotate(1deg);
        }

        .modal-close {
            position: absolute;
            top: -20px; right: -20px;
            width: 40px; height: 40px;
            background: var(--magenta);
            color: #fff;
            border: 3px solid var(--black);
            border-radius: 50%;
            font-size: 20px; font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 0px var(--black);
            font-family: 'Patrick Hand', cursive;
        }
        .modal-close:hover { transform: scale(1.1); }

    </style>
</head>
<body>
    <div class="container">
        <h1 id="date-header">Today's Edition</h1>
        
        <div class="extras">
            <button class="extra-btn" onclick="openModal()">Market Today</button>
        </div>

        <div class="pizza-wrapper">
            <!-- Sketchy Pizza SVG Outline -->
            <svg class="slice-outline" viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
                <!-- Base slice (Golden Cheese) -->
                <path d="M 15 45 Q 150 10 285 45 Q 295 55 285 65 L 175 365 Q 150 390 125 365 L 15 65 Q 5 55 15 45 Z" fill="#ffb703" stroke="var(--black)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
                <!-- Crust detail (Baked crust color) -->
                <path d="M 15 45 Q 150 10 285 45 Q 295 55 285 65 L 265 60 Q 150 25 35 60 Z" fill="#fb8500" stroke="var(--black)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M 25 70 Q 150 35 275 70" fill="none" stroke="var(--black)" stroke-width="4" stroke-linecap="round"/>
                <!-- Drippy cheese details -->
                <path d="M 40 70 Q 45 80 40 90 M 260 70 Q 255 80 260 90 M 150 370 L 150 380 M 140 372 L 142 376 M 160 372 L 158 376 M 50 160 L 55 165 M 240 180 L 235 185 M 150 190 Q 155 200 150 210" fill="none" stroke="var(--black)" stroke-width="3" stroke-linecap="round" />
            </svg>

            <!-- Toppings (Links) -->
            <div class="toppings">
                <a href="et.pdf" class="topping t-et">Eco<br>Times</a>
                <a href="bs.pdf" class="topping t-bs">Biz<br>Std</a>
                <a href="fe.pdf" class="topping t-fe">Fin<br>Exp</a>
                <a href="mint.pdf" class="topping t-mint">Mint</a>
            </div>
        </div>
    </div>

    <!-- Clipboard Modal -->
    <div id="modal" class="modal-overlay" onclick="closeModal(event)">
        <div class="clipboard" onclick="event.stopPropagation()">
            <div class="clip"></div>
            <button class="modal-close" onclick="closeModal(event)">X</button>
            <div class="paper">
                <h2>The Markets On Tuesday</h2>
                <!-- We load the image generated by the GitHub Action -->
                <!-- If the image isn't there yet, we show an alt message -->
                <img src="market_box.png" alt="Market data will appear here after the 8:15 AM cloud run!" onerror="this.onerror=null; this.src=''; this.alt='Market data will appear here tomorrow at 8:15 AM after the cloud script runs!'; this.style.border='none';">
            </div>
        </div>
    </div>

    <script>
        const options = { weekday: 'long', month: 'long', day: 'numeric' };
        document.getElementById('date-header').innerText = new Date().toLocaleDateString('en-US', options);

        function openModal() {
            const modal = document.getElementById('modal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
        }

        function closeModal(e) {
            const modal = document.getElementById('modal');
            modal.classList.remove('active');
            setTimeout(() => modal.style.display = 'none', 300);
        }
    </script>
</body>
</html>
